<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#131842;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="beamLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="200" fill="url(#bgGrad)"/>

  <!-- Beam line -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="url(#beamLine)" stroke-width="2" filter="url(#glow2)"/>

  <!-- Lattice elements along beam line -->
  <!-- Dipoles (blue rectangles) -->
  <rect x="60" y="85" width="40" height="30" rx="3" fill="#1a3a5c" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <rect x="160" y="85" width="40" height="30" rx="3" fill="#1a3a5c" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <rect x="360" y="85" width="40" height="30" rx="3" fill="#1a3a5c" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <rect x="500" y="85" width="40" height="30" rx="3" fill="#1a3a5c" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>

  <!-- Quadrupoles (purple) -->
  <rect x="120" y="88" width="20" height="24" rx="2" fill="#2a1a4c" stroke="#7b2ff7" stroke-width="1.5" opacity="0.8"/>
  <rect x="220" y="88" width="20" height="24" rx="2" fill="#2a1a4c" stroke="#7b2ff7" stroke-width="1.5" opacity="0.8"/>
  <rect x="320" y="88" width="20" height="24" rx="2" fill="#2a1a4c" stroke="#7b2ff7" stroke-width="1.5" opacity="0.8"/>
  <rect x="420" y="88" width="20" height="24" rx="2" fill="#2a1a4c" stroke="#7b2ff7" stroke-width="1.5" opacity="0.8"/>

  <!-- Sextupoles (small green) -->
  <rect x="250" y="92" width="12" height="16" rx="1" fill="#0a3a2a" stroke="#00f5d4" stroke-width="1" opacity="0.6"/>
  <rect x="450" y="92" width="12" height="16" rx="1" fill="#0a3a2a" stroke="#00f5d4" stroke-width="1" opacity="0.6"/>

  <!-- Beta function curve (sinusoidal) -->
  <path d="M 0 60 Q 50 30, 100 60 T 200 60 T 300 60 T 400 60 T 500 60 T 600 60"
        fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Dispersion curve -->
  <path d="M 0 140 Q 50 155, 100 140 T 200 140 T 300 140 T 400 140 T 500 140 T 600 140"
        fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3" stroke-dasharray="3,6"/>

  <!-- Labels -->
  <text x="75" y="78" fill="#00d4ff" font-size="8" font-family="monospace" opacity="0.6">B</text>
  <text x="125" y="82" fill="#7b2ff7" font-size="8" font-family="monospace" opacity="0.6">QF</text>
  <text x="175" y="78" fill="#00d4ff" font-size="8" font-family="monospace" opacity="0.6">B</text>
  <text x="225" y="82" fill="#7b2ff7" font-size="8" font-family="monospace" opacity="0.6">QD</text>
  <text x="252" y="86" fill="#00f5d4" font-size="7" font-family="monospace" opacity="0.6">SF</text>
  <text x="325" y="82" fill="#7b2ff7" font-size="8" font-family="monospace" opacity="0.6">QF</text>
  <text x="375" y="78" fill="#00d4ff" font-size="8" font-family="monospace" opacity="0.6">B</text>
  <text x="425" y="82" fill="#7b2ff7" font-size="8" font-family="monospace" opacity="0.6">QD</text>
  <text x="452" y="86" fill="#00f5d4" font-size="7" font-family="monospace" opacity="0.6">SD</text>
  <text x="515" y="78" fill="#00d4ff" font-size="8" font-family="monospace" opacity="0.6">B</text>

  <!-- Legend -->
  <text x="20" y="178" fill="#00d4ff" font-size="9" font-family="monospace" opacity="0.5">--- βx(s)</text>
  <text x="100" y="178" fill="#ff6b6b" font-size="9" font-family="monospace" opacity="0.5">--- ηx(s)</text>
  <text x="200" y="178" fill="#ffffff" font-size="9" font-family="monospace" opacity="0.3">lattice cell layout</text>
</svg>
