<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ringGrad)" stroke-width="4" opacity="0.3"/>

  <!-- Main accelerator ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#ringGrad)" stroke-width="6" filter="url(#glow)"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.2"/>

  <!-- Quadrupole magnets (rectangles on the ring) -->
  <rect x="96" y="31" width="8" height="14" rx="2" fill="#7b2ff7" filter="url(#glow)" transform="rotate(0,100,100)"/>
  <rect x="96" y="31" width="8" height="14" rx="2" fill="#00d4ff" filter="url(#glow)" transform="rotate(90,100,100)"/>
  <rect x="96" y="31" width="8" height="14" rx="2" fill="#7b2ff7" filter="url(#glow)" transform="rotate(180,100,100)"/>
  <rect x="96" y="31" width="8" height="14" rx="2" fill="#00d4ff" filter="url(#glow)" transform="rotate(270,100,100)"/>

  <!-- Dipole bending magnets (arcs) -->
  <path d="M 100 35 A 65 65 0 0 1 165 100" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.5" stroke-dasharray="8,12"/>
  <path d="M 165 100 A 65 65 0 0 1 100 165" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.5" stroke-dasharray="8,12"/>
  <path d="M 100 165 A 65 65 0 0 1 35 100" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.5" stroke-dasharray="8,12"/>
  <path d="M 35 100 A 65 65 0 0 1 100 35" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.5" stroke-dasharray="8,12"/>

  <!-- Beam particles -->
  <circle cx="100" cy="35" r="4" fill="#00f5d4" filter="url(#glowStrong)">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#beamPath"/>
    </animateMotion>
  </circle>
  <circle cx="100" cy="35" r="3" fill="#00d4ff" filter="url(#glowStrong)">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto" begin="1s">
      <mpath href="#beamPath"/>
    </animateMotion>
  </circle>
  <circle cx="100" cy="35" r="3.5" fill="#7b2ff7" filter="url(#glowStrong)">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto" begin="2s">
      <mpath href="#beamPath"/>
    </animateMotion>
  </circle>

  <!-- Beam path (hidden, for animation) -->
  <path id="beamPath" d="M 100 35 A 65 65 0 1 1 99.99 35" fill="none" stroke="none"/>

  <!-- Straight sections (insertion devices) -->
  <line x1="100" y1="28" x2="100" y2="8" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="172" y1="100" x2="192" y2="100" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="100" y1="172" x2="100" y2="192" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="28" y1="100" x2="8" y2="100" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>

  <!-- Center cross-hair -->
  <line x1="95" y1="100" x2="105" y2="100" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="95" x2="100" y2="105" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>
