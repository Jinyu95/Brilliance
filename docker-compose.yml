# BRILLIANCE — docker compose entry point
#
# Standard:
#   cp .env.example .env && <edit LLM_API_KEY>
#   docker compose up --build
#
# If registries are unreachable (see README → Restricted networks):
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   docker compose up --build        ← same command, override is merged automatically

services:
  app:
    build:
      context: .
      dockerfile: scripts/Dockerfile.jutrack
    image: brilliance:latest
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      EXECUTOR: local
      JUTRACK_PYTHON: ""
      JUTRACK_JL_PROJECT: /opt/JuTrack.jl
      JULIA_PKG_OFFLINE: "true"
    volumes:
      - ./sessions:/app/sessions
      - ./workspace:/app/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
